<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- 🔥 CLAVE para móviles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TAURION</title>

  <!-- Fuente moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      font-size: 2.6em;
      letter-spacing: 4px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      font-size: 1.1em;
      color: #bbb;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05em;
      transition: all 0.25s ease;
    }

    /* Colores por red */
    .whatsapp {
      background: #25D366;
      color: #000;
    }

    .tiktok {
      background: #000;
      border: 1px solid #444;
      color: #fff;
    }

    .youtube {
     background: #ff4d4d; /* rojo más claro */
     color: #000;        /* texto negro */
    }

    .facebook {
    background: #4da3ff; /* azul más claro */
    color: #000;         /* texto negro */
    }

    /* Hover elegante */
    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    /* Efecto glass leve */
    .container {
      background: rgba(255, 255, 255, 0.03);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

  </style>
</head>

<body>

<div class="container">

  <h1>TAURION</h1>
  <p>🔥 Rock y Clásicos en Vivo desde La Paz, Bolivia</p>

  <a class="btn whatsapp" href="https://wa.me/59164056477">WhatsApp</a>
  <a class="btn tiktok" href="https://www.tiktok.com/@taurion35">TikTok</a>
  <a class="btn youtube" href="https://www.youtube.com/@taurion2344">YouTube</a>
  <a class="btn facebook" href="https://www.facebook.com/share/18RuFLXgAw/">Facebook</a>

</div>

</body>
</html>
